name: CI

on: [push]

jobs:
  test_legacy_api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/legacy-api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - run: dotnet restore
      - run: dotnet build --no-restore
      - run: dotnet test ../../tests/LegacyApi.Tests

  test_notification_service:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/notification-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: services/notification-service/package-lock.json
      - run: npm ci
      - run: npm test

  test_rag_api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/rag-api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: services/rag-api/requirements.txt
      - run: pip install -r requirements.txt
      - run: pytest tests/ -v

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build and start services
        run: docker compose up --build -d
      - name: Wait for services to be ready
        run: sleep 15
      - name: Test health endpoints
        run: |
          chmod +x scripts/test_health.sh
          ./scripts/test_health.sh
      - name: Stop services
        run: docker compose down

  validate_bicep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Bicep CLI
        run: az bicep install 2>/dev/null || (curl -Lo /usr/local/bin/bicep https://github.com/Azure/bicep/releases/latest/download/bicep-linux-x64 && chmod +x /usr/local/bin/bicep)
      - name: Build Bicep (validação estática)
        run: bicep build infra/main.bicep

  eval_framework:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: eval
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install rag-api deps (reutilizadas pelo eval)
        run: pip install -r ../services/rag-api/requirements.txt
      - name: Run framework de avaliação (modo mock, sem custo)
        run: python run_eval.py

