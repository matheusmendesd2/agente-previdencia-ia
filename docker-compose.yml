version: '3.8'

services:
  rag-api:
    build: ./services/rag-api
    ports:
      - "8000:8000"
    environment:
      - VECTOR_STORE=local
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3

  legacy-api:
    build: ./services/legacy-api
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD", "powershell", "-Command", "try { (Invoke-WebRequest -Uri http://localhost:5000/health).StatusCode -eq 200 } catch { exit 1 }"]
      interval: 10s
      timeout: 5s
      retries: 3

  notification-service:
    build: ./services/notification-service
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', r => process.exit(r.statusCode===200?0:1))"]
      interval: 10s
      timeout: 5s
      retries: 3
